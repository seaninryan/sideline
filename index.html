<script type="text/babel" data-presets="react">

const { useState, useMemo, useEffect, useRef } = React;

// Shown beside the logo — bump on every deployed change so a stale cached page is obvious.
const APP_VERSION = "v20";

const CLIENT_ID = "1082152886862-ls2qdqu246emgs93q6hvrcqq4ipi1iur.apps.googleusercontent.com";

const SCOPES = "https://www.googleapis.com/auth/drive.appdata";
let accessToken = null, fileId = null, cache = {}, tokenClient = null;
let tokenExp = 0; // ms epoch when the current token dies (60s safety margin baked in)
let tokenCallback = null; // resolver for the in-flight requestToken() call
let onAuthExpired = null; // set by MatchTracker to surface the "session expired" banner

// Tokens last ~1h; keep them across refreshes within that window (sessionStorage only —
// cleared when the tab closes, never written to disk beyond the browser session).
const TOK_KEY = "sideline_tok";
function rememberToken(resp) {
  accessToken = resp.access_token;
  const ttl = Number(resp.expires_in) || 3600;
  tokenExp = Date.now() + (ttl - 60) * 1000;
  try { sessionStorage.setItem(TOK_KEY, JSON.stringify({ t: accessToken, exp: tokenExp })); } catch (e) {}
}
function recallToken() {
  try {
    const j = JSON.parse(sessionStorage.getItem(TOK_KEY));
    if (j && j.t && j.exp > Date.now()) { tokenExp = j.exp; return j.t; }
  } catch (e) {}
  return null;
}
function forgetToken() { accessToken = null; tokenExp = 0; try { sessionStorage.removeItem(TOK_KEY); } catch (e) {} }
function tokenTimeLeft() { return accessToken ? tokenExp - Date.now() : 0; }
// Roll the token before it dies. Best called from a user gesture (click) so the
// GIS popup is allowed if Google needs one; with a live session it's invisible.
async function ensureFreshToken(thresholdMs = 10 * 60 * 1000) {
  if (!accessToken || tokenTimeLeft() > thresholdMs) return true;
  return reauth();
}

// Wrap GIS's callback style in a promise: resolves with the token response,
// or with the error object (no access_token) on failure/popup-block, or null.
function requestToken(opts) {
  return new Promise((resolve) => {
    if (!tokenClient) return resolve(null);
    tokenCallback = resolve;
    try { tokenClient.requestAccessToken(opts || {}); } catch (e) { tokenCallback = null; resolve(null); }
  });
}
// Re-auth after a 401. prompt:"" skips the consent screen for a returning user,
// but the popup can still be blocked outside a click — callers handle false.
async function reauth() {
  const resp = await requestToken({ prompt: "" });
  if (resp && resp.access_token) { rememberToken(resp); return true; }
  forgetToken();
  return false;
}

async function dfetch(url, opts) {
  opts = opts || {};
  const headers = Object.assign({ Authorization: "Bearer " + accessToken }, opts.headers || {});
  const res = await fetch(url, Object.assign({}, opts, { headers }));
  if (res.status === 401) { const er = new Error("auth"); er.code = 401; throw er; }
  return res;
}
async function ensureFile() {
  if (fileId) return fileId;
  const q = encodeURIComponent("name='sideline.json'");
  const r = await dfetch("https://www.googleapis.com/drive/v3/files?spaces=appDataFolder&fields=files(id,name)&q=" + q);
  const j = await r.json();
  if (j.files && j.files.length) { fileId = j.files[0].id; return fileId; }
  const cr = await dfetch("https://www.googleapis.com/drive/v3/files", {
    method: "POST", headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ name: "sideline.json", parents: ["appDataFolder"] }),
  });
  const cj = await cr.json(); fileId = cj.id; return fileId;
}
async function driveLoad() {
  await ensureFile();
  const r = await dfetch("https://www.googleapis.com/drive/v3/files/" + fileId + "?alt=media");
  if (r.ok) { try { cache = await r.json(); } catch (e) { cache = {}; } } else { cache = {}; }
  if (!cache || typeof cache !== "object") cache = {};
}
async function driveSave() {
  await ensureFile();
  const r = await dfetch("https://www.googleapis.com/upload/drive/v3/files/" + fileId + "?uploadType=media", {
    method: "PATCH", headers: { "Content-Type": "application/json" }, body: JSON.stringify(cache),
  });
  if (!r.ok) { const er = new Error("save failed"); er.code = r.status; throw er; }
}
// Save; on a 401 (token expired) silently re-auth once and retry. If that fails too,
// tell the UI so it can show a persistent reconnect banner instead of failing quietly.
async function saveWithRetry() {
  try { await driveSave(); return true; }
  catch (e) {
    if (e.code === 401) {
      if (await reauth()) {
        try { await driveSave(); return true; } catch (e2) { e = e2; }
      }
      if (e.code === 401 && onAuthExpired) onAuthExpired();
    }
    return false;
  }
}
const store = {
  ok: true,
  async list() { return Object.keys(cache).map((id) => "match:" + id); },
  async get(id) { return cache[id] || null; },
  async set(id, data) { cache[id] = data; return saveWithRetry(); },
  async del(id) { delete cache[id]; return saveWithRetry(); },
};

function gpTotal(g, p, mode) { return mode === "goals" ? g : g * 3 + p; }
function fmtScore(g, p, mode) { return mode === "goals" ? String(g) : `${g}-${p}`; }
function squash(s) { return (s || "").toLowerCase().replace(/[^a-z0-9]/g, ""); }
const titleCase = (s) => s.replace(/\b\w/g, (c) => c.toUpperCase());
// swatch palette for the colour picker (common kit colours)
const PALETTE = ["#f5c518", "#1f7a4d", "#0c3b2a", "#7a1f1f", "#c0392b", "#2c5fa8", "#1b2a4a", "#7ec8e3",
  "#ffffff", "#111111", "#e67e22", "#5e3a87", "#d4af37", "#888888", "#16a085", "#e91e63"];
// readable text colour for a jersey/button of the given colour (dark kit => white numbers)
const contrastOn = (hex) => {
  const h = (hex || "").replace("#", "");
  const v = h.length === 3 ? h.split("").map((c) => c + c).join("") : h.padEnd(6, "0");
  const [r, g, b] = [0, 2, 4].map((i) => parseInt(v.slice(i, i + 2), 16) || 0);
  return 0.299 * r + 0.587 * g + 0.114 * b > 145 ? "#11241b" : "#ffffff";
};
const MONTHS = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
const pad2 = (n) => String(n).padStart(2, "0");
const toLocalInput = (d) => `${d.getFullYear()}-${pad2(d.getMonth() + 1)}-${pad2(d.getDate())}T${pad2(d.getHours())}:${pad2(d.getMinutes())}`;
const fmtDate = (s) => { if (!s) return ""; const d = new Date(s); if (isNaN(d)) return ""; return `${d.getDate()} ${MONTHS[d.getMonth()]} ${d.getFullYear()}, ${pad2(d.getHours())}:${pad2(d.getMinutes())}`; };
const fmtDateShort = (s) => { if (!s) return ""; const d = new Date(s); if (isNaN(d)) return ""; return `${d.getDate()} ${MONTHS[d.getMonth()]} '${String(d.getFullYear()).slice(2)}`; };
const dateKey = (s, fb) => { const d = s ? Date.parse(s) : NaN; return isNaN(d) ? (fb || 0) : d; };

/* ============================================================
   SHAREABLE INFOGRAPHIC  (pure SVG -> PNG, no external deps)
   ============================================================ */
function buildInfographicSVG(m) {
  const W = 420, P = 18, CW = W - 2 * P;
  const PITCH = "#0c3b2a", PAPER = "#f4efe1", INK = "#11241b", MUTE = "#6f7d72", LINE = "#ded4ba";
  const esc = (s) => String(s == null ? "" : s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
  const T = (x, y, s, size, fill, o = {}) => `<text x="${x}" y="${y}" font-family="Arial,Helvetica,sans-serif" font-size="${size}" fill="${fill}" font-weight="${o.w || 400}" text-anchor="${o.a || "start"}"${o.ls ? ` letter-spacing="${o.ls}"` : ""}>${esc(s)}</text>`;
  const R = (x, y, w, h, fill, rx = 0, o = {}) => `<rect x="${x}" y="${y}" width="${w}" height="${h}" fill="${fill}"${rx ? ` rx="${rx}"` : ""}${o.stroke ? ` stroke="${o.stroke}" stroke-width="${o.sw || 1}"` : ""}/>`;
  const L = (x1, y1, x2, y2, stroke, sw = 1, dash = "") => `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="${stroke}" stroke-width="${sw}"${dash ? ` stroke-dasharray="${dash}"` : ""}/>`;
  const C = (cx, cy, r, fill, o = {}) => `<circle cx="${cx}" cy="${cy}" r="${r}" fill="${fill}"${o.stroke ? ` stroke="${o.stroke}" stroke-width="${o.sw || 1}"` : ""}/>`;
  const flag = (x, y, w, h, c1, c2, stroke = "rgba(0,0,0,.3)") =>
    `<rect x="${x}" y="${y}" width="${w}" height="${h / 2}" fill="${c1}" rx="1.5"/><rect x="${x}" y="${y + h / 2}" width="${w}" height="${h / 2}" fill="${c2}"/><rect x="${x}" y="${y}" width="${w}" height="${h}" fill="none" stroke="${stroke}" stroke-width="1" rx="2"/>`;

  const head = [], body = [];
  const HH = 196;

  // ---- header band ----
  head.push(R(0, 0, W / 2, 6, m.colorUs), R(W / 2, 0, W / 2, 6, m.colorThem));
  head.push(T(P, 30, (m.grade || m.sport || "Match").toUpperCase(), 12, PAPER, { w: 700, ls: 1 }));
  head.push(T(W - P, 30, m.dateStr, 11, "#cfe3d8", { a: "end" }));
  head.push(flag(W * 0.27 - 16, 46, 32, 19, m.colorUs, m.colorUs2, "rgba(255,255,255,.55)"));
  head.push(flag(W * 0.73 - 16, 46, 32, 19, m.colorThem, m.colorThem2, "rgba(255,255,255,.55)"));
  head.push(T(W * 0.27, 84, m.usName, 15, PAPER, { w: 700, a: "middle" }));
  head.push(T(W * 0.73, 84, `${m.themName} (${m.homeAway === "home" ? "H" : "A"})`, 15, PAPER, { w: 700, a: "middle" }));
  head.push(T(W * 0.27, 132, m.totals.us.str, 44, PAPER, { w: 800, a: "middle" }));
  head.push(T(W * 0.73, 132, m.totals.them.str, 44, PAPER, { w: 800, a: "middle" }));
  head.push(T(W * 0.5, 124, "–", 24, "#7fa395", { a: "middle" }));
  const resTxt = m.result === "Win" ? "WIN" : m.result === "Loss" ? "DEFEAT" : "DRAW";
  const margin = Math.abs(m.totals.us.total - m.totals.them.total);
  const resFull = resTxt + (m.effMode === "gaa" && margin ? ` BY ${margin}` : "");
  const resBg = m.result === "Win" ? "#f5c518" : m.result === "Loss" ? "#c0392b" : "#e7dec6";
  const resFg = m.result === "Loss" ? "#ffffff" : "#11241b";
  const cw = resFull.length * 7.6 + 24;
  head.push(R(W / 2 - cw / 2, 152, cw, 24, resBg, 12));
  head.push(T(W / 2, 168, resFull, 11.5, resFg, { w: 700, a: "middle", ls: 1 }));

  let y = HH + 20;

  // ---- stats 2x2 ----
  const stats = [["Half-time", m.ht], ["Lead changes", String(m.leadChanges)], ["Times level", String(m.timesLevel)],
    ["Biggest lead", `${m.maxLead}${m.maxLeadSide ? " " + (m.maxLeadSide === "us" ? m.usName.split(" ")[0] : m.themName.split(" ")[0]) : ""}`]];
  const colW = CW / 2, rowH = 46;
  body.push(L(P + colW, y, P + colW, y + 2 * rowH, LINE, 1));
  body.push(L(P, y + rowH, P + CW, y + rowH, LINE, 1));
  stats.forEach((st, i) => {
    const c = i % 2, r = i < 2 ? 0 : 1;
    const cx = P + c * colW + colW / 2, yt = y + r * rowH;
    const big = st[0] === "Lead changes" || st[0] === "Times level";
    body.push(T(cx, yt + 21, st[1], big ? 21 : 15, PITCH, { w: 800, a: "middle" }));
    body.push(T(cx, yt + 37, st[0].toUpperCase(), 9, MUTE, { w: 700, a: "middle", ls: 0.5 }));
  });
  y += 2 * rowH + 16;

  // ---- chart ----
  const usShort = m.usName.split(" ")[0], themShort = m.themName.split(" ")[0];
  body.push(T(P, y, "SCORE PROGRESSION", 11, MUTE, { w: 700, ls: 1 }));
  // legend on title row, right side
  let lx = W - P;
  body.push(T(lx, y, themShort, 10, INK, { w: 700, a: "end" })); lx -= themShort.length * 5.6 + 6;
  body.push(flag(lx - 14, y - 8, 14, 9, m.colorThem, m.colorThem2)); lx -= 14 + 12;
  body.push(T(lx, y, usShort, 10, INK, { w: 700, a: "end" })); lx -= usShort.length * 5.6 + 6;
  body.push(flag(lx - 14, y - 8, 14, 9, m.colorUs, m.colorUs2));
  y += 10;
  const chH = 150;
  body.push(R(P, y, CW, chH, "#ffffff", 10, { stroke: LINE, sw: 1 }));
  const plotL = P + 32, plotR = P + CW - 12, plotT = y + 12, plotB = y + chH - 18;
  const xMax = Math.max(1, ...m.series.map((p) => p.x));
  const yMax = Math.max(1, ...m.series.map((p) => Math.max(p.us, p.them)));
  const pX = (x) => plotL + (plotR - plotL) * (x / xMax);
  const pY = (v) => plotB - (plotB - plotT) * (v / yMax);
  for (let g = 0; g <= 2; g++) { const v = Math.round((yMax * g) / 2); const yy = pY(v); body.push(L(plotL, yy, plotR, yy, "#eee5cf", 1)); body.push(T(plotL - 6, yy + 4, String(v), 9, MUTE, { a: "end" })); }
  if (m.htLine != null) { const hx = pX(m.htLine); body.push(L(hx, plotT, hx, plotB, PITCH, 1, "4 3")); body.push(T(hx, plotT - 3, "HT", 8, PITCH, { a: "middle", w: 700 })); }
  const step = (key) => { let d = ""; m.series.forEach((p, i) => { const px = pX(p.x), py = pY(p[key]); if (!i) d += `M ${px} ${py}`; else { d += ` L ${px} ${pY(m.series[i - 1][key])} L ${px} ${py}`; } }); return d; };
  body.push(`<path d="${step("them")}" fill="none" stroke="${m.colorThem}" stroke-width="2.5"/>`);
  body.push(`<path d="${step("us")}" fill="none" stroke="${m.colorUs}" stroke-width="3"/>`);
  m.goalDots.forEach((d) => body.push(C(pX(d.x), pY(d.y), 4, d.side === "us" ? m.colorUs : m.colorThem, { stroke: "#fff", sw: 1.5 })));
  y += chH + 22;

  // ---- our scorers ----
  body.push(T(P, y, `SCORERS · ${m.usName.toUpperCase()}`, 11, MUTE, { w: 700, ls: 1 }));
  y += 14;
  if (!m.usScorers.length) { body.push(T(P, y + 6, "No scores recorded", 12, MUTE)); y += 20; }
  m.usScorers.forEach((s) => {
    body.push(L(P, y + 17, P + CW, y + 17, "#ece3cb", 1));
    body.push(T(P, y + 12, `${s.num ? s.num + ". " : ""}${s.name}`, 13, INK, { w: 600 }));
    body.push(T(P + CW, y + 12, `${m.effMode === "goals" ? s.g : `${s.g}-${s.p}`}${s.frees ? `  (${s.frees}f)` : ""}`, 13, PITCH, { w: 700, a: "end" }));
    y += 23;
  });
  y += 16;

  // who was involved in subs (for lineup arrows)
  const subOnSet = new Set(), subOffSet = new Set();
  (m.timeline || []).forEach((t) => { if (t.kind === "sub") { if (t.onNum != null) subOnSet.add(t.onNum); if (t.offNum != null) subOffSet.add(t.offNum); } });

  // ---- lineup ----
  body.push(T(P, y, "TEAM", 11, MUTE, { w: 700, ls: 1 }));
  body.push(flag(P + 44, y - 9, 18, 11, m.colorUs, m.colorUs2));
  y += 12;
  const rows = m.formationRows && m.formationRows.length ? m.formationRows : [];
  const pitchH = rows.length ? rows.length * 54 + 20 : 28;
  body.push(R(P, y, CW, pitchH, PITCH, 12));
  body.push(R(P, y + pitchH / 2 - 0.5, CW, 1, "#1c5a40"));
  body.push(C(P + CW / 2, y + pitchH / 2, 18, "none", { stroke: "#1c5a40", sw: 1 }));
  const findName = (n) => { const p = (m.starters || []).find((x) => x.num === n); return p ? p.name : ""; };
  rows.forEach((row, ri) => {
    const jw = 27, gap = Math.min(54, (CW - 24 - row.length * jw) / Math.max(1, row.length - 1 + 0.0001));
    const total = row.length * jw + (row.length - 1) * gap;
    const sx = P + (CW - total) / 2, ry = y + 13 + ri * 54;
    row.forEach((n, ci) => {
      const jx = sx + ci * (jw + (isFinite(gap) ? gap : 0));
      body.push(R(jx, ry, jw, jw, m.colorUs, 7));
      body.push(T(jx + jw / 2, ry + 18, String(n), 13, contrastOn(m.colorUs), { w: 800, a: "middle" }));
      body.push(T(jx + jw / 2, ry + jw + 12, findName(n), 9.5, "#eaf3ee", { w: 600, a: "middle" }));
      if (subOffSet.has(n)) body.push(T(jx + jw + 2, ry + 9, "▼", 8, "#ff6e63"));
      const sc = (m.usScorers || []).find((s) => s.num === n && (s.g || s.p));
      if (sc) body.push(T(jx + jw / 2, ry + jw + 23, m.effMode === "goals" ? "●".repeat(sc.g) : `${sc.g}-${sc.p}`, 9, "#f5c518", { w: 700, a: "middle", ls: m.effMode === "goals" ? 2 : 0 }));
    });
  });
  y += pitchH + 10;
  if (m.subs && m.subs.length) {
    // bench chips, like the app: used subs wear the team colours, with on/off arrows and score badges
    body.push(T(P, y + 15, "SUBS", 9, MUTE, { w: 700, ls: 1 }));
    let bx = P + 38, by = y + 4;
    const chipH = 17;
    m.subs.forEach((p) => {
      const used = subOnSet.has(p.num) || subOffSet.has(p.num);
      const sc = (m.usScorers || []).find((s) => s.num === p.num && (s.g || s.p));
      const scoreTxt = sc ? (m.effMode === "goals" ? "●".repeat(sc.g) : `${sc.g}-${sc.p}`) : "";
      const label = `${p.num} ${p.name}`;
      const arrowsW = (subOnSet.has(p.num) ? 9 : 0) + (subOffSet.has(p.num) ? 9 : 0);
      const w = label.length * 5.4 + arrowsW + (scoreTxt ? scoreTxt.length * 5.6 + 5 : 0) + 16;
      if (bx + w > P + CW) { bx = P + 38; by += chipH + 5; }
      body.push(R(bx, by, w, chipH, used ? m.colorUs : "#ffffff", 8.5, { stroke: used ? m.colorUs2 : LINE, sw: 1 }));
      let tx = bx + 8;
      body.push(T(tx, by + 12, label, 9.5, used ? contrastOn(m.colorUs) : INK, { w: 600 }));
      tx += label.length * 5.4 + 3;
      if (subOnSet.has(p.num)) { body.push(T(tx, by + 12, "▲", 8.5, "#2ecc71", { w: 700 })); tx += 9; }
      if (subOffSet.has(p.num)) { body.push(T(tx, by + 12, "▼", 8.5, "#ff6e63", { w: 700 })); tx += 9; }
      if (scoreTxt) body.push(T(tx + 2, by + 12, scoreTxt, 9, used ? contrastOn(m.colorUs) : PITCH, { w: 700 }));
      bx += w + 6;
    });
    y = by + chipH + 6;
  }
  if (m.missing && m.missing.length) { body.push(T(P, y + 8, "Missing: " + m.missing.map((p) => `${p.num} ${p.name}`).join("   "), 10, MUTE)); y += 18; }
  y += 16;

  // ---- timeline (centre rail: us left, them right, like the app) ----
  body.push(T(P, y, "TIMELINE", 11, MUTE, { w: 700, ls: 1 }));
  y += 14;
  const railX = P + CW / 2;
  const tlTop = y;
  const tlBody = []; // items paint over the rail, so collect them and draw the rail first
  const estW = (s, fs) => String(s).length * fs * 0.54;
  const halves = [...new Set(m.timeline.map((t) => t.half))].sort((a, b) => a - b);
  halves.forEach((h) => {
    const hTxt = h === 1 ? "FIRST HALF" : h === 2 ? "SECOND HALF" : `PERIOD ${h}`;
    const pw = estW(hTxt, 9) + 22;
    tlBody.push(R(railX - pw / 2, y, pw, 15, PAPER, 7.5, { stroke: LINE, sw: 1 }));
    tlBody.push(T(railX, y + 10.5, hTxt, 9, PITCH, { w: 700, ls: 1, a: "middle" }));
    y += 22;
    m.timeline.filter((t) => t.half === h).forEach((it) => {
      const cy = y + 6;
      const mm = it.minute != null ? `${it.mmin || it.minute}'` : "";
      if (it.kind === "score") {

  const t = ca[a.ci]; ca[a.ci] = cb[b.ci]; cb[b.ci] = t;
  lines[a.li] = ca.join("|"); lines[b.li] = cb.join("|");
  return lines.join("\n");
}
// change a player's shirt number in place
function renumRoster(raw, num, newNum) {
  const lines = raw.split("\n"), end = rosterEnd(lines);
  const a = locRoster(lines, end, num);
  if (!a) return raw;
  const ch = lines[a.li].split("|");
  ch[a.ci] = ch[a.ci].replace(/\d{1,2}/, String(newNum));
  lines[a.li] = ch.join("|");
  return lines.join("\n");
}

  const doSave = async () => {
    await ensureFreshToken(); // we're inside a click — roll the token now rather than 401 mid-save
    const id = curId || ("m" + Date.now());
    const ok = await store.set(id, { ...recordPayload(), savedAt: Date.now() });
    setCurId(id);
    await refreshList();
    setSavedMsg(ok ? "Saved ✓" : "NOT saved to Drive!");
    setTimeout(() => setSavedMsg(""), ok ? 2000 : 6000);
  };
  // Auto-save matches that already live in Drive, a beat after the last change.
  // A brand-new match still needs its first explicit Save.
  useEffect(() => {
    if (!curId || !dirty) return;
    const t = setTimeout(async () => {
      const ok = await store.set(curId, { ...recordPayload(), savedAt: Date.now() });
      if (ok) { setSavedMsg("Auto-saved ✓"); setTimeout(() => setSavedMsg(""), 1200); }
      else { setSavedMsg("NOT saved to Drive!"); setTimeout(() => setSavedMsg(""), 6000); }
      await refreshList();
    }, 2500);
    return () => clearTimeout(t);
    // eslint-disable-next-line
  }, [curId, dirty, raw, matchDate, myTeam, effMode, autoMode, colorUs, colorUs2, colorThem, colorThem2]);
  // Pull the Drive copy (e.g. changes made on the phone) on demand.
  const doResync = async () => {
    if (dirty && curId && !window.confirm("This match has unsaved changes here — load the Drive copy over them?")) return;
    setSavedMsg("Syncing…");
    try {
      await ensureFreshToken();
      try { await driveLoad(); }
      catch (e) { if (e.code === 401 && (await reauth())) await driveLoad(); else throw e; }
      await refreshList();
      if (curId && cache[curId]) doLoad(curId);
      else if (curId) setCurId(null); // deleted on the other device
      setSavedMsg("Synced ✓"); setTimeout(() => setSavedMsg(""), 2000);
    } catch (e) { setSavedMsg("Sync failed — try again"); setTimeout(() => setSavedMsg(""), 4000); }
  };
  // The banner's button click is a user gesture, so the re-auth popup won't be blocked.
  // Everything is still in `cache`, so one driveSave pushes the pending change.
  const doReconnect = async () => {
    if (!(await reauth())) { setSavedMsg("Reconnect failed — try again"); setTimeout(() => setSavedMsg(""), 2500); return; }
    try { await driveSave(); setAuthLost(false); setSavedMsg("Reconnected — saved ✓"); }
    catch (e) { setSavedMsg("Reconnected, but the save failed — hit Save again"); setAuthLost(false); }
    setTimeout(() => setSavedMsg(""), 2500);
  };
  const doLoad = async (key) => {
    const id = key.replace(/^match:/, "");
    const d = await store.get(id);
    if (!d) return;
    setRaw(d.raw); setMyTeam(d.myTeam || "My Team"); setScoringMode(d.scoringMode || "gaa");
    setAutoMode(d.autoMode !== undefined ? d.autoMode : true);
    setColorUs(d.colorUs || "#f5c518"); setColorUs2(d.colorUs2 || "#1f7a4d");
    setColorThem(d.colorThem || "#c0392b"); setColorThem2(d.colorThem2 || "#2c5fa8");
    setMatchDate(d.date || d.matchDate || toLocalInput(new Date())); setCurId(id);
  };
  const doNew = () => {
    setRaw(`${myTeam.trim() || "My Team"} @ Opponent\n1 \n\n${new Date().getHours()}:${String(new Date().getMinutes()).padStart(2, "0")}\n`);
    setMatchDate(toLocalInput(new Date())); setCurId(null); setTab("notation");
  };
  const doDuplicate = () => {
    setCurId(null);
    setSavedMsg("Editing a new copy — change the date/opponent, then Save");
    setTimeout(() => setSavedMsg(""), 3500);
  };
  const doDelete = async () => {
    if (curId) { const ok = await store.del(curId); setCurId(null); await refreshList(); setSavedMsg(ok ? "Deleted" : "Delete NOT synced to Drive!"); setTimeout(() => setSavedMsg(""), ok ? 1500 : 6000); }
  };

  // edit header (opponent / home-away / label) without touching the raw text
  const setHeaderField = (field, value) => {
    const label = field === "label" ? value : (header.label || "Match");
    const opposition = field === "opposition" ? value : (header.opposition || "");
    const homeAway = field === "homeAway" ? value : (header.homeAway || "away");
    const sym = homeAway === "home" ? "v" : "@";
    const newHeader = `${label || "Match"} ${sym} ${opposition}`.replace(/\s+/g, " ").trim();
    setRaw((r) => {
      const lines = r.split("\n");
      let hi = lines.findIndex((l) => l.trim() !== "");
      if (hi === -1) return newHeader + "\n" + r;
      lines[hi] = newHeader;
      return lines.join("\n");
    });
  };
  // My team edits follow through to the header label, unless the user typed their own label (e.g. a grade).
  const onMyTeamChange = (v) => {
    const cur = (header.label || "").trim();
    if (isPlaceholderLabel(cur) || cur === myTeam.trim()) setHeaderField("label", v.trim() || "My Team");
    setMyTeam(v);
  };

  // ---- live append helpers ----
  const append = (text) => setRaw((r) => r.replace(/\s*$/, "") + "\n" + text);
  // substitution: tap the player going off (pitch) and the one coming on (subs), either order
  const completeSub = (onName, offName) => {
    append(`${new Date().getMinutes()} ${onName} for ${offName}`);
    setSubPick(null);
    setSavedMsg(`Sub added — ${onName} for ${offName}`); setTimeout(() => setSavedMsg(""), 2500);
  };
  const tapPitch = (p) => {
    if (subPick && subPick.role === "on") return completeSub(subPick.name, p.name);
    setSubPick(subPick && subPick.role === "off" && subPick.num === p.num ? null : { role: "off", ...p });
  };
  const tapBench = (p) => {
    if (subPick && subPick.role === "off") return completeSub(p.name, subPick.name);
    setSubPick(subPick && subPick.role === "on" && subPick.num === p.num ? null : { role: "on", ...p });
  };
  // lineup tools route every tap through here; default falls through to the sub flow
  const resetLineupModes = () => { setLineupMode(null); setSwapFirst(null); setRenumTarget(null); setNewNum(""); setSubPick(null); };
  const tapPlayer = (p, where) => {
    if (lineupMode === "swap") {
      if (!swapFirst) return setSwapFirst(p);
      if (swapFirst.num === p.num) return setSwapFirst(null);
      setRaw((r) => swapRosterNums(r, swapFirst.num, p.num));
      setSavedMsg(`Swapped ${swapFirst.name || swapFirst.num} & ${p.name || p.num}`); setTimeout(() => setSavedMsg(""), 2500);
      return resetLineupModes();
    }
    if (lineupMode === "renum") { setRenumTarget(p); setNewNum(String(p.num)); return; }
    return where === "pitch" ? tapPitch(p) : tapBench(p);
  };
  const renumValid = (() => {
    const n = parseInt(newNum, 10);
    return renumTarget && n >= 1 && n <= 99 && !roster.some((p) => p.num === n && p.num !== renumTarget.num);
  })();
  const applyRenum = () => {
    if (!renumValid) return;
    setRaw((r) => renumRoster(r, renumTarget.num, parseInt(newNum, 10)));
    setSavedMsg(`${renumTarget.name || renumTarget.num} now wears ${newNum}`); setTimeout(() => setSavedMsg(""), 2500);
    resetLineupModes();
  };
  const addScore = () => {
    const min = lvMin.trim() || String(new Date().getMinutes());
    let label;
    if (lvTeam === "us") {
      label = lvScorer || (myTeam || "Us"); // blank scorer = unattributed for my team
    } else {
      const t = lvOpp.trim();
      label = t ? (/^\d+$/.test(t) ? `T${t}` : t) : "T"; // number -> T11, name kept, blank -> T
    }
    let line = `${min} ${label}`;
    if (lvType === "goal") line += " goal";
    else if (lvType === "free") line += " free";
    append(line);
    setLvMin(""); setLvOpp("");
  };
  const addHalf = () => append(`\n${new Date().getHours()}:${String(new Date().getMinutes()).padStart(2, "0")}`);
  const addMarker = (mk) => append(`${new Date().getMinutes()} ${mk}`);

  // merged timeline for display
  const timeline = useMemo(() => {
    const items = [];
    parsed.scoring.forEach((s) => items.push({ kind: "score", ...s }));
    parsed.notes.forEach((n) => items.push({ kind: n.type, ...n }));
    // Preserve the order they were written. A missing timestamp (e.g. a sub)
    // just slots between the events either side of it.
    return items.sort((a, b) => (a.half - b.half) || (a.seq - b.seq));
  }, [parsed]);

  const usScorers = scorers.filter((s) => s.side === "us").sort((a, b) => gpTotal(b.g, b.p, effMode) - gpTotal(a.g, a.p, effMode));
  const themScorers = scorers.filter((s) => s.side === "them").sort((a, b) => gpTotal(b.g, b.p, effMode) - gpTotal(a.g, a.p, effMode));
  const starters = roster.filter((p) => p.role === "starting");
  const subs = roster.filter((p) => p.role === "sub");
  const missing = roster.filter((p) => p.role === "missing");
  // players involved in substitutions (by roster number), for lineup styling
  const subbedOn = new Set(notes.filter((n) => n.type === "sub" && n.onNum != null).map((n) => n.onNum));
  const subbedOff = new Set(notes.filter((n) => n.type === "sub" && n.offNum != null).map((n) => n.offNum));
  const subArrows = (num) => (subbedOn.has(num) || subbedOff.has(num)) && (
    <span style={{ fontSize: 10, letterSpacing: 1 }}>
      {subbedOn.has(num) && <span style={{ color: "#2ecc71" }}>▲</span>}
      {subbedOff.has(num) && <span style={{ color: "#ff6e63" }}>▼</span>}
    </span>
  );
  // what a player scored, for the lineup: "1-2" in GAA, a ball per goal in soccer
  const scoreFor = (num) => {
    const sc = scorers.find((s) => s.side === "us" && s.num === num && (s.g || s.p));
    if (!sc) return null;
    return <span className="pts">{effMode === "goals" ? "⚽".repeat(sc.g) : fmtScore(sc.g, sc.p, effMode)}</span>;
  };
  const chunk = (arr, n) => arr.reduce((a, _, i) => (i % n ? a : [...a, arr.slice(i, i + n)]), []);
  const formationRows = parsed.formationRows && parsed.formationRows.length
    ? parsed.formationRows
    : chunk(starters.map((p) => p.num), 3);

  const doExport = () => {
    if (modal && modal.kind === "share") { setModal(null); return; }
    const h1 = parsed.series.filter((p) => p.half === 1 && p.usScore);
    const ht = h1.length ? `${h1[h1.length - 1].usScore} – ${h1[h1.length - 1].themScore}` : `${fmtScore(0, 0, effMode)} – ${fmtScore(0, 0, effMode)}`;
    const model = {
      grade: header.label || "", sport: header.sport || "", homeAway: header.homeAway,
      usName, themName, dateStr: matchDate ? fmtDate(matchDate) : "",
      totals, result, effMode, ht,
      leadChanges: parsed.leadChanges, timesLevel: parsed.timesLevel, maxLead: parsed.maxLead, maxLeadSide: parsed.maxLeadSide,
      series: parsed.series, goalDots: parsed.goalDots, htLine: parsed.htLine, halfMarks,
      usScorers, formationRows, starters, subs, missing, timeline,
      colorUs, colorUs2, colorThem, colorThem2,
    };
    const safe = (s) => (s || "match").replace(/[^a-z0-9]+/gi, "-").replace(/^-|-$/g, "");
    const filename = `${safe(header.label)}-${safe(themName)}.png`;
    const title = `${usName} ${totals.us.str} – ${totals.them.str} ${themName}`;
    try {
      const { svg, width, height } = buildInfographicSVG(model);
      const svgUrl = "data:image/svg+xml;charset=utf-8," + encodeURIComponent(svg);
      setModal({ kind: "share", img: svgUrl, svg, filename, title, blob: null, png: false });
      svgToPng(svg, width, height)
        .then(({ blob, dataUrl }) => setModal((mm) => (mm && mm.kind === "share") ? { ...mm, blob, img: dataUrl, png: true } : mm))
        .catch(() => setModal((mm) => (mm && mm.kind === "share") ? { ...mm, png: false, pngFailed: true } : mm));
    } catch (e) {
      setModal({ kind: "share", error: true });
    }
  };
  const nativeShare = () => {
    if (!modal || !modal.blob) return;
    const file = new File([modal.blob], modal.filename, { type: "image/png" });
    if (navigator.canShare && navigator.canShare({ files: [file] })) navigator.share({ files: [file], title: modal.title }).catch(() => {});
    else downloadBlob(modal.blob, modal.filename);
  };
  const downloadSvg = () => {
    if (!modal || !modal.svg) return;
    downloadBlob(new Blob([modal.svg], { type: "image/svg+xml" }), (modal.filename || "match.png").replace(/\.png$/, ".svg"));
  };
  const openBackup = async () => {
    if (modal && modal.kind === "backup") { setModal(null); return; }
    const keys = await store.list();
    const matches = [];
    for (const k of keys) { const id = k.replace(/^match:/, ""); const d = await store.get(id); if (d) matches.push({ id, ...d }); }
    setExportText(JSON.stringify({ v: 1, matches }));
    setImportText("");
    setModal({ kind: "backup", count: matches.length });
  };
  const copyExport = () => {
    if (navigator.clipboard) navigator.clipboard.writeText(exportText).then(() => { setSavedMsg("Copied ✓"); setTimeout(() => setSavedMsg(""), 1500); }).catch(() => {});
  };
  const doImport = async () => {
    try {
      const obj = JSON.parse(importText.trim());
      const arr = obj.matches || (Array.isArray(obj) ? obj : []);
      let n = 0;
      for (const mm of arr) {
        const id = mm.id || ("m" + Date.now() + Math.floor(Math.random() * 1000));
        const { id: _drop, ...rec } = mm;
        if (await store.set(id, rec)) n++;
      }
      await refreshList();
      setModal(null); setSavedMsg(`Imported ${n} match${n === 1 ? "" : "es"} ✓`); setTimeout(() => setSavedMsg(""), 2500);
    } catch (e) { setSavedMsg("Import failed — check the text"); setTimeout(() => setSavedMsg(""), 2500); }
  };

  const tabs = [["overview", "Overview"], ["timeline", "Timeline"], ["lineup", "Lineup"], ["notation", "Notation / Live"]];

  return (
    <div className="mt-root">
      <style>{CSS}</style>

      {/* top bar */}
      <div className="mt-bar">
        <div className="mt-logo">
          {/* same ball as icon-180.png (tools/make-icon.py geometry) */}
          <svg width="22" height="22" viewBox="0 0 128 128" aria-hidden="true"><defs><clipPath id="bc"><circle cx="64" cy="64" r="56"/></clipPath></defs><circle cx="64" cy="64" r="56" fill="#f7f7f2"/><g clipPath="url(#bc)" fill="#1c1c1c"><polygon points="64.0,44.0 83.0,57.8 75.8,80.2 52.2,80.2 45.0,57.8"/><line x1="64.0" y1="44.0" x2="64.0" y2="15.8" stroke="#1c1c1c" strokeWidth="3"/><polygon points="64.0,20.4 46.9,8.0 53.4,-12.2 74.6,-12.2 81.1,8.0"/><line x1="83.0" y1="57.8" x2="109.8" y2="49.1" stroke="#1c1c1c" strokeWidth="3"/><polygon points="105.5,50.5 112.0,30.4 133.2,30.4 139.7,50.5 122.6,63.0"/><line x1="75.8" y1="80.2" x2="92.3" y2="103.0" stroke="#1c1c1c" strokeWidth="3"/><polygon points="89.6,99.3 110.8,99.3 117.3,119.4 100.2,131.8 83.1,119.4"/><line x1="52.2" y1="80.2" x2="35.7" y2="103.0" stroke="#1c1c1c" strokeWidth="3"/><polygon points="38.4,99.3 44.9,119.4 27.8,131.8 10.7,119.4 17.2,99.3"/><line x1="45.0" y1="57.8" x2="18.2" y2="49.1" stroke="#1c1c1c" strokeWidth="3"/><polygon points="22.5,50.5 5.4,63.0 -11.7,50.5 -5.2,30.4 16.0,30.4"/></g><circle cx="64" cy="64" r="56" fill="none" stroke="#1c1c1c" strokeWidth="2"/></svg>
          SIDELINE <i className="mt-ver">{APP_VERSION}</i>
        </div>
        <div className="grow" />
        <select className="mt-sel" value={curId || ""} onChange={(e) => e.target.value && doLoad(e.target.value)}>
          <option value="">{store.ok ? (curId ? "Saved matches…" : "* new match — not saved") : "Storage off"}</option>
          {saved.map((m) => <option key={m.id} value={m.id}>{m.id === curId && dirty ? "* " + m.label : m.label}</option>)}
        </select>
        <button className="mt-btn" onClick={doNew}>New</button>
        <button className="mt-btn solid" onClick={doSave}>Save{dirty ? " *" : ""}</button>
        <button className="mt-btn" onClick={doExport}>Share image</button>
        <button className="mt-btn" onClick={openBackup}>Backup</button>
        <button className="mt-btn" onClick={doResync}>Resync</button>
        {curId && <button className="mt-btn" onClick={doDuplicate}>Duplicate</button>}
        {curId && <button className="mt-btn" onClick={doDelete}>Delete</button>}
      </div>
      {savedMsg && <div className="mt-toast">{savedMsg}</div>}

      {authLost && (
        <div className="mt-authlost">
          <span>Google session expired — your last change hasn't been saved to Drive.</span>
          <button className="mt-btn solid" onClick={doReconnect}>Reconnect &amp; save</button>
        </div>
      )}
      {authSoon && !authLost && (
        <div className="mt-authlost" style={{ background: "#9a7b0a" }}>
          <span>Google session expires soon.</span>
          <button className="mt-btn solid" onClick={doStayConnected}>Stay signed in</button>
        </div>
      )}

      {modal && (
        <div className="mt-panel">
          {modal.kind === "share" && (
            <>
              <div className="mt-panel-head"><h3>Match image</h3><button className="mt-add alt" onClick={() => setModal(null)}>Close</button></div>
              {modal.error && <p className="hint">Couldn't build the image — try again.</p>}
              {modal.img && <img className="shot" src={modal.img} alt="match infographic" />}
              {modal.img && <p className="hint"><b>Press and hold the image</b> to save it to Photos or share it{modal.png ? "." : " (preparing a saveable version…)"}</p>}
              <div className="row">
                {modal.png && <button className="mt-add" onClick={nativeShare}>Save / Share</button>}
                {modal.img && !modal.png && <button className="mt-add alt" onClick={downloadSvg}>Download</button>}
              </div>
              {modal.pngFailed && <p className="hint">A PNG couldn't be made in this browser — long-press the image above to save it, or use Download.</p>}
            </>
          )}
          {modal.kind === "backup" && (
            <>
              <div className="mt-panel-head"><h3>Backup &amp; transfer</h3><button className="mt-add alt" onClick={() => setModal(null)}>Close</button></div>
              <p className="hint">From the device that has your matches, tap Copy, then paste it into Import on the other device. ({modal.count} saved here.)</p>
              <textarea readOnly value={exportText} onClick={(e) => e.target.select()} />
              <div className="row"><button className="mt-add" onClick={copyExport}>Copy</button></div>
              <p className="hint" style={{ marginTop: 14 }}>Import — paste a backup here to load every match onto this device:</p>
              <textarea value={importText} placeholder="paste backup text here" onChange={(e) => setImportText(e.target.value)} />
              <div className="row"><button className="mt-add" onClick={doImport} disabled={!importText.trim()}>Import</button></div>
            </>
          )}
        </div>
      )}

      {/* settings */}
      <div className="mt-settings">
        <label>Date <input type="date" value={(matchDate || "").slice(0, 10)} onChange={(e) => e.target.value && setMatchDate(`${e.target.value}T${(matchDate || "").slice(11, 16) || "12:00"}`)} />
          <input type="time" value={(matchDate || "").slice(11, 16)} onChange={(e) => e.target.value && setMatchDate(`${(matchDate || "").slice(0, 10)}T${e.target.value}`)} /></label>
        <label>My team <input type="text" value={myTeam} onChange={(e) => onMyTeamChange(e.target.value)} /> <button className="mt-swatch" title="Primary" style={{ background: colorUs }} onClick={() => setColorPick(colorPick === "us" ? null : "us")} /><button className="mt-swatch" title="Secondary" style={{ background: colorUs2 }} onClick={() => setColorPick(colorPick === "us2" ? null : "us2")} /></label>
        <label>
          <select className="mt-sel" style={{ color: "#222", background: "#fffdf6", borderColor: "#d8cfb8" }}
            value={header.homeAway === "home" ? "home" : "away"} onChange={(e) => setHeaderField("homeAway", e.target.value)}>
            <option value="away">Away @</option>
            <option value="home">Home v</option>
          </select>
        </label>
        <label>Opponent <input type="text" value={header.opposition || ""} placeholder="Opponent"
          onChange={(e) => setHeaderField("opposition", e.target.value)} /> <button className="mt-swatch" title="Primary" style={{ background: colorThem }} onClick={() => setColorPick(colorPick === "them" ? null : "them")} /><button className="mt-swatch" title="Secondary" style={{ background: colorThem2 }} onClick={() => setColorPick(colorPick === "them2" ? null : "them2")} /></label>
        <label>Scoring
          <select className="mt-sel" style={{ color: "#222", background: "#fffdf6", borderColor: "#d8cfb8" }}
            value={autoMode ? "auto" : scoringMode}
            onChange={(e) => { if (e.target.value === "auto") setAutoMode(true); else { setAutoMode(false); setScoringMode(e.target.value); } }}>
            <option value="auto">Auto: {effMode === "gaa" ? "Gaelic" : "goals"}</option>
            <option value="gaa">GAA (goals & points)</option>
            <option value="goals">Goals only (soccer)</option>
          </select>
        </label>
      </div>

      {colorPick && (() => {
        const map = {
          us: [colorUs, setColorUs, `${usName} — primary`], us2: [colorUs2, setColorUs2, `${usName} — secondary`],
          them: [colorThem, setColorThem, `${themName} — primary`], them2: [colorThem2, setColorThem2, `${themName} — secondary`],
        };
        const [val, setVal, label] = map[colorPick];
        const sw = (c) => (
          <button key={c} className={"mt-swatch big" + (c === (val || "").toLowerCase() ? " on" : "")}
            style={{ background: c }} onClick={() => setVal(c)} title={c} />
        );
        return (
          <div className="mt-live" style={{ marginTop: 0 }}>
            <div className="mt-row">
              <span className="mt-h" style={{ margin: 0 }}>Colour — {label}</span>
              <button className="mt-add alt" style={{ marginLeft: "auto" }} onClick={() => setColorPick(null)}>Done</button>
            </div>
            {usedColors.length > 0 && <>
              <p className="mt-note" style={{ marginTop: 10, marginBottom: 4 }}>Used before</p>
              <div className="mt-row">{usedColors.map(sw)}</div>
            </>}
            <p className="mt-note" style={{ marginTop: 10, marginBottom: 4 }}>Palette</p>
            <div className="mt-row">{PALETTE.filter((c) => !usedColors.includes(c)).map(sw)}</div>
            <p className="mt-note" style={{ marginTop: 10, marginBottom: 4 }}>Advanced — exact colour
              <input type="color" value={val} onChange={(e) => setVal(e.target.value)} style={{ marginLeft: 8, verticalAlign: "middle" }} /></p>
          </div>
        );
      })()}

      {/* scoreboard */}
      <div className="mt-board">
        <div className="mt-meta">{header.sport || "Match"} · {header.homeAway === "away" ? "Away" : header.homeAway === "home" ? "Home" : ""} {header.label ? "· " + header.label : ""}{matchDate ? " · " + fmtDate(matchDate) : ""}</div>
        <div className="mt-score">
          <div className="mt-team">
            <div className="nm"><span className="mt-chip" style={{ background: `linear-gradient(135deg, ${colorUs} 0 50%, ${colorUs2} 50% 100%)` }} /><b>{usName}</b></div>
            <div className="mt-big">{totals.us.str}</div>
            <div className="mt-tot">{effMode === "gaa" ? `${totals.us.total} pts` : "goals"}</div>
          </div>
          <div className="mt-vs">vs</div>
          <div className="mt-team">
            <div className="nm"><b>{themName}</b><span className="mt-chip" style={{ background: `linear-gradient(135deg, ${colorThem} 0 50%, ${colorThem2} 50% 100%)` }} /></div>
            <div className="mt-big">{totals.them.str}</div>
            <div className="mt-tot">{effMode === "gaa" ? `${totals.them.total} pts` : "goals"}</div>
          </div>
        </div>
        <div className="mt-resbar">
          <span className={"mt-res " + result}>
            {result === "Win" ? "Win" : result === "Loss" ? "Defeat" : "Draw"}
            {effMode === "gaa" && totals.us.total !== totals.them.total ? ` by ${Math.abs(totals.us.total - totals.them.total)}` : ""}
          </span>
        </div>
      </div>

      {/* tabs */}
      <div className="mt-tabs">
        {tabs.map(([id, lbl]) => (
          <button key={id} className={"mt-tab" + (tab === id ? " on" : "")} onClick={() => setTab(id)}>{lbl}</button>
        ))}
      </div>

      <div className="mt-body">
        {tab === "overview" && (
          <>
            {parsed.warnings.length > 0 && (
              <div className="mt-warn">
                <b>Heads up — check {parsed.warnings.length} {parsed.warnings.length === 1 ? "entry" : "entries"}.</b>
                <span> {parsed.warnings.map((w) => `${w.minute}' — ${w.msg}`).join("; ")}.</span>
              </div>
            )}
            <div className="mt-stats">
              <StatCard k="Half-time" v={(() => {
                let g = 0, p = 0, tg = 0, tp = 0;
                parsed.scoring.filter((s) => s.half === 1).forEach((s) => s.side === "us" ? (s.type === "goal" ? g++ : p++) : (s.type === "goal" ? tg++ : tp++));
                return `${fmtScore(g, p, effMode)} – ${fmtScore(tg, tp, effMode)}`;
              })()} />
              <StatCard k="Lead changes" v={parsed.leadChanges} />
              <StatCard k="Times level" v={parsed.timesLevel} />
              <StatCard k={`Biggest lead${parsed.maxLeadSide ? " · " + (parsed.maxLeadSide === "us" ? usName : themName) : ""}`} v={parsed.maxLead} />
              <StatCard k="Top scorer" v={usScorers[0] ? `${usScorers[0].name.split(" ")[0]} ${effMode === "goals" ? usScorers[0].g : `${usScorers[0].g}-${usScorers[0].p}`}` : "—"} />

            <p className="mt-h">Score progression</p>
            <div style={{ width: "100%" }}>
              <ScoreChart series={series} goalDots={goalDots} htLine={htLine} colorUs={colorUs === "#f5c518" ? "#d9af00" : colorUs} colorThem={colorThem} />
            </div>
            <p className="mt-note">● large dots mark goals. Step lines show the running total ({effMode === "gaa" ? "goals ×3 + points" : "goals"}).</p>

            <p className="mt-h" style={{ marginTop: 18 }}>Top scorers — {usName}</p>
            <table className="mt-tbl">
              <thead><tr><th>Player</th><th>Goals</th><th>Points</th><th>Frees</th><th>Total</th></tr></thead>
              <tbody>
                {usScorers.map((s, i) => (
                  <tr key={i}>
                    <td>{s.num ? <span className="mt-num">{s.num}</span> : null}{s.name}</td>
                    <td className="n">{s.g}</td><td className="n">{s.p}</td>
                    <td>{s.frees || "–"}</td>
                    <td className="n">{effMode === "goals" ? s.g : `${s.g}-${s.p}`}</td>
                  </tr>
                ))}
                {usScorers.length === 0 && <tr><td colSpan={5} style={{ color: "#6f7d72" }}>No scores parsed yet.</td></tr>}
              </tbody>
            </table>

            {themScorers.length > 0 && (
              <>
                <p className="mt-h" style={{ marginTop: 18 }}>{themName} scorers</p>
                <table className="mt-tbl">
                  <thead><tr><th>Player</th><th>Goals</th><th>Points</th><th>Frees</th><th>Total</th></tr></thead>
                  <tbody>
                    {themScorers.map((s, i) => (
                      <tr className="them" key={i}><td>{s.name === "Opposition" ? themName : s.name}</td><td className="n">{s.g}</td><td className="n">{s.p}</td><td>{s.frees || "–"}</td><td className="n">{effMode === "goals" ? s.g : `${s.g}-${s.p}`}</td></tr>
                    ))}
                  </tbody>

            )}
          </>
        )}

        {tab === "timeline" && (
          <div className="mt-tl">
            {[1, 2].map((h) => {
              const items = timeline.filter((t) => t.half === h);
              if (!items.length) return null;
              const mk = halfMarks.find((m) => m.half === h && m.clock);
              const addedMk = halfMarks.find((m) => m.half === h && m.marker && m.added > 0);
              return (
                <div key={h}>
                  <div className="mt-half">{h === 1 ? "First half" : "Second half"}{mk ? ` · ${mk.clock}` : ""}</div>
                  {items.map((it, i) => {
                    if (it.kind === "score") {
                      // a scorer we couldn't attribute is description, not a name: "GOAL long free"
                      const descriptive = !it.sure && it.scorer && it.scorer !== "Opposition" && it.scorer !== "Unknown";
                      const evName = it.scorer === "Opposition" ? themName : it.scorer;
                      return (
                        <div key={i} className={`mt-ev ${it.side} ${it.type}`} style={{ "--dot": it.side === "us" ? colorUs : colorThem, "--ring": it.side === "us" ? colorUs2 : colorThem2 }}>
                          <span className="m">{it.mmin || it.minute}'</span>
                          <span>
                            {descriptive
                              ? <>{it.type === "goal" && <span className="mt-pill goal" style={{ marginLeft: 0, marginRight: 6 }}>goal</span>}<span style={{ color: "#6f7d72" }}>{it.desc || it.scorer}</span></>
                              : <>{evName}{it.type === "goal" ? <span className="mt-pill goal">goal</span> : it.fromFree ? <span className="mt-pill free">free</span> : ""}</>}
                          </span>
                          <span className="sc">{it.usScore} – {it.themScore}</span>
                        </div>
                      );
                    }
                    if (it.kind === "sub") return <div key={i} className="mt-ev subev"><span className="m">{it.minute != null ? `${it.mmin || it.minute}'` : ""}</span><span><span style={{ color: "#1f7a4d", fontWeight: 600 }}>▲ {it.on}</span>&ensp;<span style={{ color: "#c0392b", fontWeight: 600 }}>▼ {it.off}</span></span></div>;
                    return <div key={i} className="mt-ev note"><span className="m">{it.minute != null ? `${it.mmin || it.minute}'` : "✎"}</span><span style={{ color: "#6f7d72" }}>{it.text}</span></div>;
                  })}
                  {addedMk && <div className="mt-ev mid"><span className="chip">⏱ +{addedMk.added} added</span></div>}
                </div>
              );
            })}
            {timeline.length === 0 && <p style={{ color: "#6f7d72" }}>No events parsed.</p>}
          </div>
        )}

        {tab === "lineup" && (
          <>
            <div className="mt-pitch" style={{ background: `linear-gradient(${colorUs2}22, #0c3b2a 60%)` }}>
              {formationRows.map((row, ri) => (
                <div className="mt-line" key={ri}>
                  {row.map((n) => {
                    const p = starters.find((x) => x.num === n);
                    return (
                      <div className="mt-jersey" key={n} style={{ cursor: "pointer" }} onClick={() => tapPlayer({ num: n, name: p ? p.name : String(n) }, "pitch")}>
                        <div className="j" style={{ background: colorUs, color: contrastOn(colorUs), borderBottom: `4px solid ${colorUs2}`, outline: (subPick && subPick.role === "off" && subPick.num === n) || (swapFirst && swapFirst.num === n) || (renumTarget && renumTarget.num === n) ? "2px solid #f5c518" : "none", outlineOffset: 2 }}>{n}</div>
                        <div className="nm">{p ? p.name : ""} {subArrows(n)}</div>
                        {scoreFor(n)}
                      </div>
                    );
                  })}
                </div>
              ))}
            </div>
            {renumTarget ? (
              <div className="mt-live" style={{ marginTop: 10, marginBottom: 0 }}>
                <div className="mt-row">
                  <span className="mt-h" style={{ margin: 0 }}>New number for {renumTarget.num}. {renumTarget.name}</span>
                  <input style={{ width: 56 }} value={newNum} onChange={(e) => setNewNum(e.target.value.replace(/\D/g, ""))} />
                  {!renumValid && newNum && <span className="mt-note" style={{ margin: 0 }}>taken</span>}
                  <button className="mt-add" disabled={!renumValid} onClick={applyRenum}>OK</button>
                  <button className="mt-add alt" onClick={resetLineupModes}>Cancel</button>
                </div>
              </div>
            ) : lineupMode === "swap" ? (
              <div className="mt-live" style={{ marginTop: 10, marginBottom: 0 }}>
                <div className="mt-row">
                  <span className="mt-h" style={{ margin: 0 }}>
                    {swapFirst ? <>Swapping {swapFirst.num}. {swapFirst.name} — tap the second player</> : <>Reshuffle — tap two players to swap their spots (subs too)</>}
                  </span>
                  <button className="mt-add alt" style={{ marginLeft: "auto" }} onClick={resetLineupModes}>Cancel</button>
                </div>
              </div>
            ) : lineupMode === "renum" ? (
              <div className="mt-live" style={{ marginTop: 10, marginBottom: 0 }}>
                <div className="mt-row">
                  <span className="mt-h" style={{ margin: 0 }}>Change number — tap the player wearing a different number</span>
                  <button className="mt-add alt" style={{ marginLeft: "auto" }} onClick={resetLineupModes}>Cancel</button>
                </div>
              </div>
            ) : subPick ? (
              <div className="mt-live" style={{ marginTop: 10, marginBottom: 0 }}>
                <div className="mt-row">
                  <span className="mt-h" style={{ margin: 0 }}>
                    {subPick.role === "off" ? <>{subPick.num}. {subPick.name} off — now tap who comes on</> : <>{subPick.num}. {subPick.name} on — now tap who comes off</>}
                  </span>
                  <button className="mt-add alt" style={{ marginLeft: "auto" }} onClick={() => setSubPick(null)}>Cancel</button>
                </div>
              </div>
            ) : (
              <div className="mt-row" style={{ marginTop: 8 }}>
                <p className="mt-note" style={{ margin: 0, flex: 1, minWidth: 180 }}>Substitution: tap the player going off and the sub coming on (either order). The minute is filled in for you — edit it in Notation any time.</p>
                <button className="mt-add alt" onClick={() => { resetLineupModes(); setLineupMode("swap"); }}>Reshuffle</button>
                <button className="mt-add alt" onClick={() => { resetLineupModes(); setLineupMode("renum"); }}>Change number</button>
              </div>
            )}
            {subs.length > 0 && <><p className="mt-h" style={{ marginTop: 16 }}>Subs</p><div className="mt-bench">{subs.map((p) => {
              const picked = (subPick && subPick.role === "on" && subPick.num === p.num) || (swapFirst && swapFirst.num === p.num) || (renumTarget && renumTarget.num === p.num);
              const used = subbedOn.has(p.num) || subbedOff.has(p.num); // used subs wear the team colours
              const st = picked ? { background: "#f5c518", borderColor: "#f5c518" }
                : used ? { background: colorUs, color: contrastOn(colorUs), borderColor: colorUs2 } : {};
              return <span className="b" key={p.num} style={{ cursor: "pointer", ...st }} onClick={() => tapPlayer({ num: p.num, name: p.name }, "bench")}>{p.num}. {p.name} {subArrows(p.num)} {scoreFor(p.num)}</span>;
            })}</div></>}
            {missing.length > 0 && <><p className="mt-h" style={{ marginTop: 14 }}>Missing</p><div className="mt-bench">{missing.map((p) => <span className="b miss" key={p.num}>{p.num}. {p.name}</span>)}</div></>}
          </>
        )}

        {tab === "notation" && (
          <>
            <div className="mt-live">
              <p className="mt-h" style={{ marginBottom: 8 }}>Add as it happens</p>
              <div className="mt-row" style={{ marginBottom: 10 }}>
                <div className="mt-toggle">
                  <button className={"tg" + (lvTeam === "us" ? " on" : "")} style={lvTeam === "us" ? { background: colorUs, color: contrastOn(colorUs) } : undefined} onClick={() => setLvTeam("us")}>{usName}</button>
                  <button className={"tg" + (lvTeam === "them" ? " on" : "")} style={lvTeam === "them" ? { background: colorThem, color: contrastOn(colorThem) } : undefined} onClick={() => setLvTeam("them")}>{themName}</button>
                </div>
              </div>
              <div className="mt-row">
                <input style={{ width: 56 }} placeholder={`${new Date().getMinutes()}'`} value={lvMin} onChange={(e) => setLvMin(e.target.value)} />
                {lvTeam === "us" ? (
                  <select value={lvScorer} onChange={(e) => setLvScorer(e.target.value)}>
                    <option value="">{usName} — unattributed</option>
                    {roster.map((p) => <option key={p.num + p.name} value={p.name}>{p.num}. {p.name}</option>)}
                  </select>
                ) : (
                  <input style={{ width: 150 }} placeholder="opp #/name (optional)" value={lvOpp} onChange={(e) => setLvOpp(e.target.value)} />
                )}
                <select value={lvType} onChange={(e) => setLvType(e.target.value)}>
                  <option value="point">{effMode === "goals" ? "Goal" : "Point"}</option>
                  {effMode !== "goals" && <option value="free">Free</option>}
                  {effMode !== "goals" && <option value="goal">Goal</option>}
                </select>
                <button className="mt-add" onClick={addScore}>+ Score</button>
                <button className="mt-add alt" onClick={addHalf}>Start half</button>
                <button className="mt-add alt" onClick={() => addMarker("HT")}>HT</button>
                <button className="mt-add alt" onClick={() => addMarker("FT")}>FT</button>
              </div>
              <p className="mt-note">Pick which side scored, then the scorer. Leave the minute blank to stamp the current minute ({new Date().getMinutes()}'). Everything updates live.</p>
            </div>
            <p className="mt-h">Raw notation (edit freely — re-parses instantly)</p>
            <textarea className="mt-ta" value={raw} onChange={(e) => setRaw(e.target.value)} spellCheck={false} />
            <p className="mt-note" style={{ marginTop: 8 }}>
              Format reminder: header <code>Team @ Opp</code> (@ = away, v = home) · roster <code>11. Rick</code> ·
              start each half with the clock time on its own line · scoring lines <code>min scorer [free|goal]</code> ·
              opposition = <code>T</code> / <code>T11</code> · subs <code>X for Y</code> · notes anything else.
            </p>
          </>
        )}
      </div>
    </div>
  );
}


/* ---- dependency-free score chart (replaces recharts) ---- */
function ScoreChart({ series, goalDots, htLine, colorUs, colorThem }) {
  const W = 720, H = 280, L = 40, Rp = 14, Tp = 14, Bp = 26;
  const xMax = Math.max(1, ...series.map((p) => p.x));
  const yMax = Math.max(1, ...series.map((p) => Math.max(p.us, p.them)));
  const pX = (x) => L + (W - L - Rp) * (x / xMax);
  const pY = (v) => (H - Bp) - ((H - Bp) - Tp) * (v / yMax);
  const stepPath = (key) => {
    let d = "";
    series.forEach((p, i) => {
      const px = pX(p.x), py = pY(p[key]);
      if (!i) d += "M " + px + " " + py;
      else d += " L " + px + " " + pY(series[i - 1][key]) + " L " + px + " " + py;
    });
    return d;
  };
  const grid = [];
  for (let g = 0; g <= 2; g++) { const v = Math.round((yMax * g) / 2); grid.push({ v, y: pY(v) }); }
  return (
    <svg viewBox={"0 0 " + W + " " + H} style={{ width: "100%", height: "auto", display: "block" }}>
      {grid.map((gd, i) => (
        <g key={i}>
          <line x1={L} y1={gd.y} x2={W - Rp} y2={gd.y} stroke="#e3d9bf" />
          <text x={L - 6} y={gd.y + 4} fontSize="11" fill="#6f7d72" textAnchor="end" fontFamily="Oswald,sans-serif">{gd.v}</text>
        </g>
      ))}
      {htLine != null && (
        <g>
          <line x1={pX(htLine)} y1={Tp} x2={pX(htLine)} y2={H - Bp} stroke="#0c3b2a" strokeDasharray="4 3" />
          <text x={pX(htLine)} y={Tp - 2} fontSize="10" fill="#0c3b2a" textAnchor="middle" fontWeight="700" fontFamily="Oswald,sans-serif">HT</text>
        </g>
      )}
      <path d={stepPath("them")} fill="none" stroke={colorThem} strokeWidth="2.5" />
      <path d={stepPath("us")} fill="none" stroke={colorUs} strokeWidth="3" />
      {goalDots.map((d, i) => (
        <circle key={i} cx={pX(d.x)} cy={pY(d.y)} r="4.5" fill={d.side === "us" ? colorUs : colorThem} stroke="#fff" strokeWidth="1.5" />
      ))}
    </svg>
  );
}

/* ---- sign-in + Google Drive bootstrap ---- */
function SignIn({ phase, err, onSignIn }) {
  const busy = phase === "wait" || phase === "load";
  const label = phase === "load" ? "Loading your matches…" : phase === "wait" ? "Starting…" : "Sign in with Google";
  return (
    <div className="si-wrap"><div className="si-card">
      <h1>SIDELINE</h1>
      <p>Match data is saved privately in your own Google Drive and synced across your devices.</p>
      <button className="si-btn" onClick={onSignIn} disabled={busy}>{label}</button>
      <div className="si-status">{err || (phase === "load" ? "Syncing…" : "")}</div>
    </div></div>
  );
}
function App() {
  const [phase, setPhase] = useState("wait");
  const [err, setErr] = useState("");
  useEffect(() => {
    let tries = 0;
    const iv = setInterval(() => {
      tries++;
      if (window.google && window.google.accounts && window.google.accounts.oauth2) {
        clearInterval(iv);
        try {
          tokenClient = google.accounts.oauth2.initTokenClient({
            client_id: CLIENT_ID, scope: SCOPES,
            // Both callbacks just resolve the pending requestToken() promise;
            // callers decide what a missing access_token means.
            callback: (resp) => { const cb = tokenCallback; tokenCallback = null; if (cb) cb(resp); },
            error_callback: (e) => { const cb = tokenCallback; tokenCallback = null; if (cb) cb(e); },
          });
          // Refresh within the token's ~1h window: resume without a sign-in click.
          const saved = recallToken();
          if (saved) {
            accessToken = saved;
            setPhase("load");
            driveLoad().then(() => setPhase("ready"))
              .catch(() => { forgetToken(); setPhase("out"); });
          } else { setPhase("out"); }
        } catch (e) { setErr("Google sign-in failed to initialise."); setPhase("out"); }
      } else if (tries > 100) { clearInterval(iv); setErr("Google sign-in didn't load — check your connection."); setPhase("out"); }
    }, 100);
    return () => clearInterval(iv);
  }, []);
  const signIn = async () => {
    setErr("");
    if (!tokenClient) { setErr("Still starting up — try again in a second."); return; }
    const resp = await requestToken();
    if (resp && resp.access_token) {
      rememberToken(resp);
      setPhase("load");
      try { await driveLoad(); setPhase("ready"); }
      catch (e) { setErr("Couldn't read Drive. Check the Client ID, that the Drive API is enabled, and that you're a test user."); setPhase("out"); }
    } else if (resp && resp.type) { setErr("Sign-in failed (" + resp.type + ")."); }
  };
  if (phase === "ready") return <MatchTracker />;
  return <SignIn phase={phase} err={err} onSignIn={signIn} />;
}
ReactDOM.createRoot(document.getElementById("root")).render(<App />);

</script>
